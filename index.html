<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asifiwe — Welcome To My World</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">✦ Asifiwe</a>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link active">Home</a></li>
                <li><a href="about.html" class="nav-link">About</a></li>
                <li><a href="portfolio.html" class="nav-link">Portfolio</a></li>
                <li><a href="contact.html" class="nav-link">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">

        <!-- Hero Section -->
        <section class="hero-section">
            <div class="orbit-container">
                <div class="center-circle"></div>
                <div class="orbit-ring"></div>
                <div class="orbiting-photo"></div>
            </div>

            <div class="welcome-section">
                <h1 class="welcome-text">Welcome<br>To My<br>World</h1>
                <p class="welcome-subtitle">Grade 7 · Explorer · Creator · Dreamer</p>
                <span class="welcome-badge">✦ Ntare Louisenlund School</span>
            </div>
        </section>

        <!-- Carousel Section -->
        <section class="carousel-section">
            <p class="section-label">✦ Moments That Inspire Me ✦</p>
            <div class="carousel-container">
                <div class="carousel-track">
                    <div class="carousel-item"><img src="https://i.imgur.com/K9sPQF3.jpeg" alt="Sunset Sky"></div>
                    <div class="carousel-item"><img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800" alt="Starry Night"></div>
                    <div class="carousel-item"><img src="https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?w=800" alt="Galaxy"></div>
                    <div class="carousel-item"><img src="https://images.unsplash.com/photo-1444080748397-f442aa95c3e5?w=800" alt="Milky Way"></div>
                    <div class="carousel-item"><img src="https://images.unsplash.com/photo-1470071459604-7b8ec44ffd0e?w=800" alt="Northern Lights"></div>
                    <div class="carousel-item"><img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800" alt="Forest"></div>
                </div>
            </div>

            <button class="carousel-btn prev" id="prevBtn">‹</button>
            <button class="carousel-btn next" id="nextBtn">›</button>

            <div class="carousel-indicators">
                <span class="indicator active" data-index="0"></span>
                <span class="indicator" data-index="1"></span>
                <span class="indicator" data-index="2"></span>
                <span class="indicator" data-index="3"></span>
                <span class="indicator" data-index="4"></span>
                <span class="indicator" data-index="5"></span>
            </div>
        </section>

        <!-- Quick Links -->
        <div class="quick-links">
            <a href="about.html" class="quick-link">✦ About Me</a>
            <a href="portfolio.html" class="quick-link">✦ My Projects</a>
            <a href="contact.html" class="quick-link">✦ Get In Touch</a>
        </div>

    </main>

    <script src="script.js"></script>
</body>
</html>
